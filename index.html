<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Cumple AR</title>

<script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
<script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
</head>

<body style="margin:0; overflow:hidden;">

<div id="mensajeInicial"
style="
position:fixed;
top:50%;
left:50%;
transform:translate(-50%,-50%);
z-index:9999;
background:white;
padding:20px;
border-radius:15px;
font-size:24px;
font-weight:bold;
text-align:center;
box-shadow:0 0 15px rgba(0,0,0,0.3);
">
📷 Apunta tu cámara a la invitación
</div>

<div id="menu"
style="
display:none;
position:fixed;
top:50%;
left:50%;
transform:translate(-50%,-50%);
z-index:9999;
text-align:center;
">

<button id="mensajeBtn"
style="
display:block;
width:320px;
margin:15px;
padding:20px;
font-size:22px;
font-weight:bold;
border-radius:15px;
border:none;
background:#ffcc00;
cursor:pointer;
">
🎂 Alejandro tiene un mensaje para ti
</button>

<button id="ubicacionBtn"
style="
display:block;
width:320px;
margin:15px;
padding:20px;
font-size:22px;
font-weight:bold;
border-radius:15px;
border:none;
background:#87CEEB;
cursor:pointer;
">
📍 Esta es la ubicación
</button>

</div>

<a-scene embedded arjs>

<a-assets>

<video
id="cumplevideo"
src="AleCumple6.mp4"
preload="auto"
playsinline
webkit-playsinline
crossorigin="anonymous">
</video>

</a-assets>

<a-marker preset="hiro">

<a-video
src="#cumplevideo"
position="0 1.5 0"
rotation="-90 0 0"
width="1.0"
height="1.8">
</a-video>

</a-marker>

<a-entity camera></a-entity>

</a-scene>

<script>

const video = document.getElementById("cumplevideo");
const menu = document.getElementById("menu");
const mensajeInicial = document.getElementById("mensajeInicial");

let marcadorVisible = false;

document.getElementById("mensajeBtn")
.addEventListener("click", function() {

    video.src = "AleCumple6.mp4";

    video.load();

    menu.style.display = "none";

    video.play();

});

document.getElementById("ubicacionBtn")
.addEventListener("click", function() {

    video.src = "ubicacion.mp4";

    video.load();

    menu.style.display = "none";

    video.play();

});

const marker = document.querySelector("a-marker");

marker.addEventListener("markerFound", function () {

    marcadorVisible = true;

    mensajeInicial.style.display = "none";

    if (video.paused) {
        menu.style.display = "block";
    }

});

marker.addEventListener("markerLost", function () {

    marcadorVisible = false;

    video.pause();

    menu.style.display = "none";

});

video.addEventListener("ended", function () {

    if (marcadorVisible) {
        menu.style.display = "block";
    }

});

</script>

</body>
</html>

<!DOCTYPE html>
<html>
<head>

<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Atrapa las Estrellas</title>

<style>

html, body{

    width:100%;
    height:100%;

    margin:0;
    overflow:hidden;
}

body{

    font-family:Arial,sans-serif;

    background-image:url("background.png");

    background-size:cover;

    background-position:center center;

    background-repeat:no-repeat;

    background-attachment:fixed;
}
    
#hud{

    position:fixed;

    top:15px;
    left:50%;

    transform:translateX(-50%);

    z-index:1000;

    background:rgba(0,0,80,0.85);

    color:white;

    padding:12px 24px;

    border-radius:20px;

    font-size:24px;
    font-weight:bold;

    box-shadow:0 0 15px rgba(0,0,0,0.5);

    white-space:nowrap;

    min-width:220px;

    text-align:center;
}
#inicio{

    position:fixed;

    top:50%;
    left:50%;

    transform:translate(-50%,-50%);

    background:rgba(0,0,80,0.85);

    color:white;

    padding:30px;

    border-radius:20px;

    text-align:center;

    z-index:2000;

    width:80%;
    max-width:400px;
}

#resultado{

    display:none;

    position:fixed;

    top:50%;
    left:50%;

    transform:translate(-50%,-50%);

    background:rgba(0,0,80,0.90);

    color:white;

    padding:30px;

    border-radius:20px;

    text-align:center;

    z-index:2000;

    width:80%;
    max-width:400px;
}

button{

    padding:15px 25px;

    border:none;

    border-radius:15px;

    font-size:22px;

    font-weight:bold;

    cursor:pointer;

    margin-top:15px;
}

#star{

    position:fixed;

    width:140px;

    left:50%;
    top:50%;

    display:none;

    z-index:1500;

    user-select:none;
    -webkit-user-select:none;

    animation:glow 1.5s infinite;
}

@keyframes glow{

    0%{
        filter:
        drop-shadow(0 0 10px white)
        drop-shadow(0 0 15px gold);
    }

    50%{
        filter:
        drop-shadow(0 0 20px white)
        drop-shadow(0 0 40px gold);
    }

    100%{
        filter:
        drop-shadow(0 0 10px white)
        drop-shadow(0 0 15px gold);
    }

}

.puntoFlotante{

    position:fixed;

    color:white;

    font-size:42px;

    font-weight:bold;

    z-index:3000;

    pointer-events:none;

    animation:subirPunto 0.8s forwards;
}

@keyframes subirPunto{

    0%{
        opacity:1;
        transform:translateY(0);
    }

    100%{
        opacity:0;
        transform:translateY(-80px);
    }

}

#celebracion{

    display:none;

    position:fixed;

    left:0;
    top:0;

    width:100%;
    height:100%;

    z-index:4000;

    pointer-events:none;
}

.estrellaCelebracion{

    position:fixed;

    width:80px;

    animation:caerEstrella 2s linear forwards;
}

@keyframes caerEstrella{

    0%{

        transform:
        translateY(-150px)
        rotate(0deg);

        opacity:1;
    }

    100%{

        transform:
        translateY(120vh)
        rotate(720deg);

        opacity:0;
    }

}
</style>

</head>

<body>

<div id="hud">

⭐ <span id="puntos">0</span>

&nbsp;&nbsp;&nbsp;

⏱️ <span id="tiempo">30</span>

</div>

<div id="inicio">

<h1>⭐ Atrapa las Estrellas 4 ⭐</h1>

<p>
Ayuda a Mario a reunir estrellas galácticas.
</p>

<button id="comenzar">

🚀 Comenzar

</button>

</div>

<div id="resultado"></div>
<div id="celebracion"></div>
    
<img id="star" src="star.png">
<audio id="coinSound" preload="auto">
    <source src="coin.mp3" type="audio/mpeg">
</audio>
<audio id="yahooSound" preload="auto">
    <source src="yahoo.mp3" type="audio/mpeg">
</audio>   
<script>

const coinSound = document.getElementById("coinSound");
const yahooSound =
document.getElementById("yahooSound");
const celebracion =
document.getElementById("celebracion");
const resultado =
document.getElementById("resultado");
const estrellas = [

    "yellowstar.png",
    "bluestar.png",
    "pinkstar.png",
    "blackstar.png"

];

let estrellaActual = 0;
let puntos = 0;
let tiempo = 30;

let x = window.innerWidth * 0.5;
let y = window.innerHeight * 0.5;

let vx = 5;
let vy = 4;

let intervaloJuego;
let intervaloTiempo;

const star = document.getElementById("star");

function moverEstrella(){

    x += vx;
    y += vy;

    if(x < 0 || x > window.innerWidth - 110){

        vx = -vx;

    }

    if(y < 100 || y > window.innerHeight - 110){

        vy = -vy;

    }

    star.style.left = x + "px";
    star.style.top = y + "px";
}
function mostrarPunto(x,y){

    const punto = document.createElement("div");

    punto.className = "puntoFlotante";

    punto.innerHTML = "+1 ⭐";

    punto.style.left = x + "px";
    punto.style.top = y + "px";

    document.body.appendChild(punto);

    setTimeout(function(){

        punto.remove();

    },800);

}

function lanzarCelebracion(){

    celebracion.innerHTML = "";

    celebracion.style.display = "block";

    yahooSound.currentTime = 0;

    yahooSound.play();

    for(let i=0;i<25;i++){

        const estrella =
        document.createElement("img");

        estrella.className =
        "estrellaCelebracion";

        estrella.src =
        estrellas[Math.floor(
        Math.random()*estrellas.length)];

        estrella.style.left =
        Math.random()*90 + "%";

        estrella.style.animationDelay =
        (Math.random()*0.8)+"s";

        celebracion.appendChild(estrella);

    }

    setTimeout(function(){

        celebracion.style.display="none";

    },2000);

}
star.addEventListener("click", function(){
    coinSound.currentTime = 0;
    coinSound.play();
    puntos++;
    estrellaActual++;

    if(estrellaActual >= estrellas.length){
    estrellaActual = 0;
    }
    star.src = estrellas[estrellaActual];
    mostrarPunto(x,y);
    document.getElementById("puntos").innerText = puntos;

    x = Math.random() * (window.innerWidth - 140);

    y = 120 + Math.random() * (window.innerHeight - 260);

    star.style.left = x + "px";
    star.style.top = y + "px";

    vx *= 1.05;
    vy *= 1.05;

    star.style.transform = "scale(1.4)";

    setTimeout(function(){

        star.style.transform = "scale(1)";

    },150);

});

document.getElementById("comenzar")
.addEventListener("click", function(){

    document.getElementById("inicio").style.display = "none";
    star.style.left = x + "px";
    star.style.top = y + "px";
    star.style.display = "block";

    intervaloJuego = setInterval(moverEstrella,16);

    intervaloTiempo = setInterval(function(){

        tiempo--;

        document.getElementById("tiempo").innerText = tiempo;

        if(tiempo <= 0){

            clearInterval(intervaloJuego);
            clearInterval(intervaloTiempo);

            star.style.display = "none";

            let rango = "🌱 Pequeño Explorador";

            if(puntos >= 10) rango = "⭐ Cazador de Estrellas";

            if(puntos >= 20) rango = "🚀 Capitán Galáctico";

            if(puntos >= 30) rango = "👑 Maestro de la Galaxia";

lanzarCelebracion();

setTimeout(function(){

    resultado.innerHTML = `

        <h1>🌟 Fin del Juego 🌟</h1>

        <h2>${puntos} estrellas</h2>

        <h2>${rango}</h2>

        <button onclick="location.reload()">
        Jugar otra vez
        </button>

        <br>

        <button onclick="window.location.href='index.html'">
        Volver a la invitación
        </button>

    `;

    resultado.style.display = "block";

},2000);
        }

    },1000);

});

</script>

</body>
</html>

<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Cumple AR</title>

<script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
<script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
</head>

<body style="margin:0; overflow:hidden;">

<a-scene embedded arjs>

<a-assets>
<video
id="cumplevideo"
src="AleCumple6.mp4"
preload="auto"
loop
playsinline
webkit-playsinline
crossorigin="anonymous">
</video>
</a-assets>

<a-marker preset="hiro">

<a-video
src="#cumplevideo"
position="0 1.5 0"
rotation="-90 0 0"
width="1.2"
height="2.1">
</a-video>

</a-marker>

<a-entity camera></a-entity>

</a-scene>

<script>
document.body.addEventListener("click", function() {
  const v = document.getElementById("cumplevideo");
  v.play();
});
</script>

</body>
</html>

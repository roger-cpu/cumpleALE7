<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Alejandro Galaxy AR</title>

<script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
<script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar-nft.js"></script>
<style>

@keyframes floatStar {

  0% {
    transform: translateY(0px);
  }

  50% {
    transform: translateY(-12px);
  }

  100% {
    transform: translateY(0px);
  }

}

@keyframes glowStar {

  0% {
    filter: drop-shadow(0 0 5px gold);
  }

  50% {
    filter: drop-shadow(0 0 35px gold);
  }

  100% {
    filter: drop-shadow(0 0 5px gold);
  }

}

.floatingStar {

  animation:
    floatStar 2.5s ease-in-out infinite,
    glowStar 2.5s ease-in-out infinite;

}

</style>
</head>
<body style="margin:0; overflow:hidden;">
<div id="mensajeInicial"
style="
position:fixed;
top:15px;
left:50%;
transform:translateX(-50%);
z-index:9999;
background:rgba(0,0,60,0.80);
color:white;
padding:10px 18px;
border-radius:25px;
font-size:16px;
font-weight:bold;
text-align:center;
box-shadow:0 0 10px rgba(0,0,0,0.4);
">
⭐ Apunta a la invitación para iniciar la misión... 8
</div>


<div id="menu"
style="
display:none;
position:fixed;
top:50%;
left:50%;
transform:translate(-50%,-50%);
z-index:9999;
text-align:center;
background:rgba(0,0,60,0.85);
padding:25px;
border-radius:20px;
">

<img
src="star.png"
class="floatingStar"
style="
width:150px;
display:block;
margin:0 auto 20px auto;
">

<div
style="
color:white;
font-size:24px;
font-weight:bold;
margin-bottom:20px;
">
⭐ ¿Qué misión quieres iniciar?
</div>

<button id="mensajeBtn"
style="
display:block;
width:320px;
margin:15px;
padding:20px;
font-size:22px;
font-weight:bold;
border-radius:15px;
border:none;
background:#FFD700;
color:black;
cursor:pointer;
">
🌟 Mensaje Galáctico
</button>

<button id="ubicacionBtn"
style="
display:block;
width:320px;
margin:15px;
padding:20px;
font-size:22px;
font-weight:bold;
border-radius:15px;
border:none;
background:#5B5BFF;
color:white;
cursor:pointer;
">
🪐 Viaje al Planeta Fiesta
</button>
<button id="juegoBtn"
style="
display:block;
width:320px;
margin:15px;
padding:20px;
font-size:22px;
font-weight:bold;
border-radius:15px;
border:none;
background:#32CD32;
color:white;
cursor:pointer;
">
🎮 Atrapa las Estrellas
</button>
</div>

<div id="videoMenu"
style="
display:none;
position:fixed;
bottom:20px;
left:50%;
transform:translateX(-50%);
z-index:9999;
text-align:center;
">
</div>

<a-scene embedded arjs>

<a-assets>

<video
id="cumplevideo"
src="AleCumple6.mp4"
preload="auto"
playsinline
webkit-playsinline
crossorigin="anonymous">
</video>
<img id="testimg" src="star.png">
</a-assets>

<!-- hiro 
<a-marker preset="hiro">

<a-video
src="#cumplevideo"
position="0 0.01 0"
rotation="-90 0 0"
width="0.8"
height="1.4">
</a-video>

</a-marker>
-->
<!-- inicio de los marcadores AR -->
  <a-nft
type="nft"
url="/cumpleALE7/marker/invitacion"
smooth="true"
smoothCount="10"
smoothTolerance="0.01"
smoothThreshold="5">
<!--
<a-video
src="#cumplevideo"
position="0 0 0"
rotation="-90 0 0"
width="3"
height="5">
</a-video>
-->
    <a-image
src="#testimg"
position="0 0 0"
rotation="-90 0 0"
width="3"
height="3">
</a-image>
</a-nft>

<a-entity camera></a-entity>

</a-scene>

<script>

const video = document.getElementById("cumplevideo");
const menu = document.getElementById("menu");
const videoMenu = document.getElementById("videoMenu");
const mensajeInicial = document.getElementById("mensajeInicial");

let marcadorVisible = false;

function mostrarBotonAlternativo(videoActual){

    if(videoActual === "AleCumple6.mp4"){

        videoMenu.innerHTML = `
        <button id="cambiarUbicacion"
        style="
        padding:18px 28px;
        font-size:20px;
        font-weight:bold;
        border:none;
        border-radius:15px;
        background:#5B5BFF;
        color:white;
        cursor:pointer;
        ">
        🪐 Viaje al Planeta Fiesta
        </button>
        `;

        document.getElementById("cambiarUbicacion")
        .addEventListener("click", function(){

            video.src = "ubicacion.mp4";

            video.load();

            video.play();

            mostrarBotonAlternativo("ubicacion.mp4");

        });

    } else {

        videoMenu.innerHTML = `
        <button id="cambiarMensaje"
        style="
        padding:18px 28px;
        font-size:20px;
        font-weight:bold;
        border:none;
        border-radius:15px;
        background:#FFD700;
        color:black;
        cursor:pointer;
        ">
        🌟 Mensaje Galáctico
        </button>
        `;

        document.getElementById("cambiarMensaje")
        .addEventListener("click", function(){

            video.src = "AleCumple6.mp4";

            video.load();

            video.play();

            mostrarBotonAlternativo("AleCumple6.mp4");

        });

    }

    videoMenu.style.display = "block";
}

document.getElementById("mensajeBtn")
.addEventListener("click", function() {

    video.src = "AleCumple6.mp4";

    video.load();

    menu.style.display = "none";

    video.play();

    mostrarBotonAlternativo("AleCumple6.mp4");

});

document.getElementById("ubicacionBtn")
.addEventListener("click", function() {

    video.src = "ubicacion.mp4";

    video.load();

    menu.style.display = "none";

    video.play();

    mostrarBotonAlternativo("ubicacion.mp4");

});

document.getElementById("juegoBtn")
.addEventListener("click", function() {

    window.location.href = "juego.html";

});

  
const marker = document.querySelector("a-nft");
console.log("NFT:", marker);

marker.addEventListener("markerFound", function () {
    console.log("NFT DETECTADO");
});

marker.addEventListener("markerLost", function () {
    console.log("NFT PERDIDO");
});
marker.addEventListener("markerFound", function () {

    marcadorVisible = true;

    mensajeInicial.style.display = "none";

    if(video.paused){

        menu.style.display = "block";

    }

});

marker.addEventListener("markerLost", function () {

    marcadorVisible = false;

    video.pause();

    menu.style.display = "none";

    videoMenu.style.display = "none";

    mensajeInicial.style.display = "block";

});

video.addEventListener("ended", function () {

    videoMenu.style.display = "none";

    if(marcadorVisible){

        menu.style.display = "block";

    }

});

</script>

</body>
</html>
